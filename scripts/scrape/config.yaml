# Brand scraping configuration (Shopify storefront JSON API)
# Single source of truth — do not duplicate as config.json
# Run one brand:  python3 scripts/scrape/scrape_brand.py naturehike
# Run all brands: python3 scripts/scrape/scrape_all.py

brands:
  naturehike:
    brandId: naturehike
    sourceSite: naturehike.com
    baseUrl: https://www.naturehike.com
    currency: USD
    adapter: shopify
    rateLimitSeconds: 1.0
    collections:
      - handle: tents
        category: tent
        subcategory: Tents
      - handle: sleeping-bags
        category: sleeping-bag
        subcategory: Sleeping Bags
        excludeTitleKeywords:
          - gift card
          - liner
          - pillow
          - foot cover
          - foot covers
          - sleeping pad
          - mat only
      - handle: sleeping-pads
        category: sleeping-pad
        subcategory: Sleeping Pads
        excludeTitleKeywords:
          - pillow
          - liner
          - pump only
          - repair kit
          - stuff sack
          - valve only
          - gift card
          - car inflatable
          - car mounted
      - handle: furniture
        classifyFurniture: true
        subcategory: Furniture
        excludeTitleKeywords:
          - cot
          - shelf
          - wagon
          - hook
          - peg
          - storage
          - container
    allProductsFilters:
      - category: tarp
        includeKeywords:
          - tarp
          - canopy
          - shelter
          - awning
        includeProductTypes:
          - Tarp
          - Canopies
        excludeTitleKeywords:
          - pop-up tent
          - camping tent with
          - auto tent

  snow-peak:
