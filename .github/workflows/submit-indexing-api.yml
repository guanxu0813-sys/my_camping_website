name: Submit URLs to Google Indexing API

on:
  push:
    branches: [main]
    paths:
      - "data/seo.json"
      - "sitemap.xml"
      - "robots.txt"
      - "*.html"
      - "scripts/build_sitemap.py"
      - "scripts/submit_indexing_api.py"
      - ".github/workflows/submit-indexing-api.yml"
  workflow_dispatch:

jobs:
  submit-indexing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sitemap and SEO assets
        run: python3 scripts/build_sitemap.py

      - name: Preview URLs (dry-run)
        run: python3 scripts/submit_indexing_api.py --dry-run

      - name: Submit URLs to Google Indexing API
        env:
          GSC_INDEXING_SA_JSON: ${{ secrets.GSC_INDEXING_SA_JSON }}
        run: |
          if [ -z "$GSC_INDEXING_SA_JSON" ]; then
            echo "::notice title=Indexing API skipped::Add repository secret GSC_INDEXING_SA_JSON. See docs/gsc-indexing-api-setup.md"
            exit 0
          fi
          echo "$GSC_INDEXING_SA_JSON" > /tmp/gsc-indexing-sa.json
          chmod 600 /tmp/gsc-indexing-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gsc-indexing-sa.json
          pip install -q -r requirements-dev.txt
          python3 scripts/submit_indexing_api.py
