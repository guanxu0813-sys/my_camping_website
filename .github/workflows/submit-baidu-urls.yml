name: Submit URLs to Baidu indexing API

on:
  push:
    branches: [main]
    paths:
      - "data/seo.json"
      - "sitemap.xml"
      - "robots.txt"
      - "*.html"
      - "scripts/submit_baidu_urls.py"
      - ".github/workflows/submit-baidu-urls.yml"
  workflow_dispatch:

jobs:
  submit-baidu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preview URLs (dry-run)
        run: python3 scripts/submit_baidu_urls.py --dry-run

      - name: Submit URLs to Baidu API
        env:
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: |
          if [ -z "$BAIDU_PUSH_TOKEN" ]; then
            echo "::notice title=Baidu API skipped::Add repository secret BAIDU_PUSH_TOKEN. See docs/baidu-setup-campgearcompare.md"
            exit 0
          fi
          pip install -q -r requirements-dev.txt
          python3 scripts/submit_baidu_urls.py || code=$?
          if [ "${code:-0}" -eq 2 ]; then
            echo "::warning title=Baidu quota exhausted::Daily API quota used up. Retry tomorrow."
            exit 0
          fi
          exit "${code:-0}"
