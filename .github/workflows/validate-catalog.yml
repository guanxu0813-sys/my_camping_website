name: Validate catalog JSON

on:
  push:
    paths:
      - "data/**"
      - ".github/workflows/validate-catalog.yml"
  pull_request:
    paths:
      - "data/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          python3 -c "
          import json, sys
          for path in ('data/brands.json', 'data/site.json'):
              with open(path, encoding='utf-8') as f:
                  json.load(f)
              print('OK', path)
          "

      - name: Build catalog.js bundle
        run: python3 scripts/build_catalog.py

      - name: Validate official catalog
        run: python3 scripts/validate_official.py

      - name: Validate sponsor campaigns
        run: python3 scripts/validate_sponsors.py
